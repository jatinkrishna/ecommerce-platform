## 🔧 **Step 3: CI/CD Pipeline Setup**

### **Option A: Azure DevOps**

#### **3.1 Create azure-pipelines.yml:**

<function_calls>
<invoke name="create_file">
<parameter name="content"># Azure DevOps Pipeline for E-Commerce Platform

trigger:
  branches:
    include:
      - main
      - staging
      - develop
  paths:
    exclude:
      - docs/*
      - README.md

variables:
  buildConfiguration: 'Release'
  dotNetVersion: '8.x'

stages:
  # ===== BUILD STAGE =====
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Build Solution'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          # Install .NET SDK
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              version: $(dotNetVersion)
          
          # Restore dependencies
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'
          
          # Build solution
          - task: DotNetCoreCLI@2
            displayName: 'Build Solution'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'
          
          # Run tests (when added)
          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build'
            continueOnError: true
          
          # Publish Identity API
          - task: DotNetCoreCLI@2
            displayName: 'Publish Identity API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '**/Ecommerce.Identity.API.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/identity-api'
              zipAfterPublish: true
          
          # Publish Notification API
          - task: DotNetCoreCLI@2
            displayName: 'Publish Notification API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '**/Ecommerce.Notification.API.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/notification-api'
              zipAfterPublish: true
          
          # Publish artifacts
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'

  # ===== DEV DEPLOYMENT =====
  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy to Dev Environment'
        environment: 'Development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                # Download artifacts
                - download: current
                  artifact: drop
                
                # Deploy Identity API
                - task: AzureWebApp@1
                  displayName: 'Deploy Identity API to Dev'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-identity-api-dev'
                    package: '$(Pipeline.Workspace)/drop/identity-api/*.zip'
                
                # Deploy Notification API
                - task: AzureWebApp@1
                  displayName: 'Deploy Notification API to Dev'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-notification-api-dev'
                    package: '$(Pipeline.Workspace)/drop/notification-api/*.zip'

  # ===== UAT DEPLOYMENT =====
  - stage: DeployUAT
    displayName: 'Deploy to UAT'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployUATJob
        displayName: 'Deploy to UAT Environment'
        environment: 'UAT'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                
                - task: AzureWebApp@1
                  displayName: 'Deploy Identity API to UAT'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-identity-api-uat'
                    package: '$(Pipeline.Workspace)/drop/identity-api/*.zip'
                
                - task: AzureWebApp@1
                  displayName: 'Deploy Notification API to UAT'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-notification-api-uat'
                    package: '$(Pipeline.Workspace)/drop/notification-api/*.zip'

  # ===== PRODUCTION DEPLOYMENT =====
  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        displayName: 'Deploy to Production'
        environment: 'Production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                
                # Manual approval happens at Environment level
                
                - task: AzureWebApp@1
                  displayName: 'Deploy Identity API to Production'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-identity-api-prod'
                    package: '$(Pipeline.Workspace)/drop/identity-api/*.zip'
                    deploymentMethod: 'zipDeploy'
                
                - task: AzureWebApp@1
                  displayName: 'Deploy Notification API to Production'
                  inputs:
                    azureSubscription: 'Azure-DevOps-Connection'
                    appType: 'webAppLinux'
                    appName: 'ecommerce-notification-api-prod'
                    package: '$(Pipeline.Workspace)/drop/notification-api/*.zip'
                    deploymentMethod: 'zipDeploy'
                
                # Health check
                - task: PowerShell@2
                  displayName: 'Health Check'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $identityHealth = Invoke-RestMethod -Uri "https://api.ecommerce.com/api/health"
                      $notificationHealth = Invoke-RestMethod -Uri "https://api.ecommerce.com/notification/api/health"
                      
                      if ($identityHealth.status -ne "Healthy" -or $notificationHealth.status -ne "Healthy") {
                        Write-Error "Health check failed!"
                        exit 1
                      }
                      
                      Write-Host "Health checks passed!"
