# 🚀 Complete Deployment Guide - Multi-Environment Strategy

## 📊 **Deployment Overview**

```
Local Development
    ↓ (git push)
Development Branch → Dev Environment (Automated)
    ↓ (PR + Review)
Staging/UAT Branch → UAT Environment (Automated)
    ↓ (PR + Approval)
Main/Production Branch → Production Environment (Manual Approval)
```

---

## 🌳 **Git Branching Strategy**

### **Branch Structure:**

```
main (production)
├── staging (UAT)
├── develop (development)
└── feature/* (feature branches)
```

### **Branching Rules:**

1. **main** - Production-ready code only
   - Protected branch
   - Requires PR approval
   - Auto-deploys to Production
   - Never commit directly

2. **staging** - UAT testing
   - Merged from develop
   - Auto-deploys to UAT
   - QA testing happens here

3. **develop** - Integration branch
   - Merged from feature branches
   - Auto-deploys to Dev
   - Continuous integration

4. **feature/** - New features
   - Branch from develop
   - Merge back to develop via PR

---

## 🎯 **Step 1: Set Up Git Repository**

### **1.1 Initialize Repository:**

```powershell
# Initialize git (if not already done)
git init

# Add remote (replace with your repo URL)
git remote add origin https://github.com/your-org/ecommerce-platform.git

# Create gitignore (already exists)
# Verify .gitignore includes:
# - bin/
# - obj/
# - *.user
# - appsettings.Development.json (sensitive data)
```

### **1.2 Create Branch Structure:**

```powershell
# Create and push main branch
git checkout -b main
git add .
git commit -m "Initial commit - Complete Phase 3"
git push -u origin main

# Create develop branch
git checkout -b develop
git push -u origin develop

# Create staging branch
git checkout -b staging
git push -u origin staging

# Return to develop for development
git checkout develop
```

### **1.3 Protect Branches (GitHub/Azure DevOps):**

**GitHub:**
- Go to Settings → Branches → Branch protection rules
- Add rule for `main`:
  - Require pull request reviews (2 approvers)
  - Require status checks to pass
  - Require branches to be up to date
  - Include administrators
  
- Add rule for `staging`:
  - Require pull request reviews (1 approver)
  - Require status checks to pass

---

## 🏗️ **Step 2: Set Up Environments**

### **2.1 Environment Configuration:**

| Environment | Purpose | URL | Deployment |
|-------------|---------|-----|------------|
| **Dev** | Development testing | dev.api.ecommerce.com | Auto from `develop` |
| **UAT** | User acceptance testing | uat.api.ecommerce.com | Auto from `staging` |
| **Prod** | Production | api.ecommerce.com | Manual from `main` |

### **2.2 Create Environment-Specific Config:**

**Create these files:**

```powershell
# Development
touch Ecommerce.Identity.API/appsettings.Development.json
touch Ecommerce.Notification.API/appsettings.Development.json

# UAT
touch Ecommerce.Identity.API/appsettings.UAT.json
touch Ecommerce.Notification.API/appsettings.UAT.json

# Production
touch Ecommerce.Identity.API/appsettings.Production.json
touch Ecommerce.Notification.API/appsettings.Production.json
```

**Example - Identity API Production Config:**

```json
{
  "ConnectionStrings": {
    "DefaultConnection": "#{DB_CONNECTION_PROD}#",
    "Redis": "#{REDIS_CONNECTION_PROD}#"
  },
  "Jwt": {
    "Secret": "#{JWT_SECRET_PROD}#",
    "Issuer": "EcommerceIdentityAPI",
    "Audience": "EcommerceClients",
    "ExpirationInMinutes": 60,
    "RefreshTokenExpirationInDays": 7
  },
  "RabbitMQ": {
    "Host": "#{RABBITMQ_HOST_PROD}#",
    "Port": 5672,
    "Username": "#{RABBITMQ_USER_PROD}#",
    "Password": "#{RABBITMQ_PASS_PROD}#",
    "VirtualHost": "/",
    "ExchangeName": "ecommerce.events",
    "ExchangeType": "topic",
    "Durable": true,
    "AutoDelete": false
  },
  "Serilog": {
    "MinimumLevel": {
      "Default": "Warning"
    }
  }
}
```

**Note:** `#{VARIABLE}#` are placeholder tokens that CI/CD will replace.

