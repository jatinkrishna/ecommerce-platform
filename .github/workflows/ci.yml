name: CI

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend - lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-frontend  # <-- CHANGE THIS to your frontend folder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ecommerce-frontend/package-lock.json # <-- CHANGE if path differs

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present -- --watchAll=false

      - name: Build
        run: npm run build
        env:
          # Provide a dummy value so builds never fail due to missing env var
          REACT_APP_API_URL: https://example.invalid
